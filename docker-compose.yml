version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: telemedicine-db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build: ./server
    container_name: telemedicine-server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/telemedicine
      - JWT_SECRET=${JWT_SECRET}
      - PDF_SIGNING_SECRET=${PDF_SIGNING_SECRET}
    depends_on:
      - mongodb

  signaling:
    build: ./signaling-server
    container_name: telemedicine-signaling
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - server

  client:
    build: .
    container_name: telemedicine-client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  mongo-data:
